name: Build APK and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 for SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: sdkmanager --install "platforms;android-32" "build-tools;32.0.0"

      - name: Set up JDK 8 for build script
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Build signed APK
        run: |
          chmod +x ./build.sh
          JDK8_HOME="$JAVA_HOME" ./build.sh

      - name: Prepare release file
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          cp build/SimpleScanner.apk "dist/SimpleScanner-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleScanner-apk
          path: dist/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
