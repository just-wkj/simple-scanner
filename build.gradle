plugins {
    id 'com.android.application' version '8.5.2'
}

android {
    namespace 'com.codex.simplescanner'
    compileSdk 32

    defaultConfig {
        applicationId 'com.codex.simplescanner'
        minSdk 23
        targetSdk 32
        versionCode 1
        versionName '1.0'
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src']
            res.srcDirs = ['res']
        }
    }
}

dependencies {
    implementation files('libs/core-3.3.1.jar')
}
